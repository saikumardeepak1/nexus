name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  api-test:
    name: API — lint, typecheck, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus
          POSTGRES_DB: nexus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexus"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      qdrant:
        image: qdrant/qdrant:v1.11.0
        ports:
          - 6333:6333
        options: >-
          --health-cmd "bash -c 'exec 3<>/dev/tcp/localhost/6333'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://nexus:nexus@localhost:5432/nexus
      REDIS_URL: redis://localhost:6379/0
      QDRANT_URL: http://localhost:6333
      GEMINI_API_KEY: ci-placeholder-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/api/pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Typecheck (mypy)
        run: mypy app
      - name: Apply migrations
        run: alembic upgrade head
      - name: Test (pytest)
        run: pytest -q --cov=app --cov-report=term-missing --cov-report=html
      - name: Publish coverage summary
        if: always()
        run: |
          {
            echo "## API coverage"
            echo '```'
            coverage report
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage-html
          path: apps/api/htmlcov

  web-test:
    name: Web — lint, typecheck, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint (eslint)
        run: npm run lint
      - name: Typecheck (tsc)
        run: npm run typecheck
      - name: Test (vitest)
        run: npm run test
      - name: Build
        run: npm run build

  docker-build:
    name: Docker build verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build api image
        run: docker build -t nexus-api:ci apps/api
      - name: Build web image
        run: docker build -t nexus-web:ci apps/web
