services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexus}
      POSTGRES_DB: ${POSTGRES_DB:-nexus}
    ports:
      # Bound to localhost only: postgres does not need to be reachable from
      # outside this host, only from the api/migrate/worker containers over
      # the compose network. Exposed on localhost so an operator can still
      # psql in for debugging. See README.md#deployment for the production
      # hardening notes this reflects.
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexus}"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.11.0
    restart: unless-stopped
    ports:
      # See the postgres port comment above; same reasoning applies here.
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      # See the postgres port comment above; same reasoning applies here.
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot: applies Alembic migrations then exits 0. Not a long-running
  # service, so no restart policy (the default "no" is correct here) and no
  # healthcheck of its own; api and worker gate their startup on this
  # container reaching a successful exit via `condition:
  # service_completed_successfully` below, which is the ordering guarantee
  # this service exists to provide.
  migrate:
    build:
      context: ../apps/api
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://nexus:nexus@postgres:5432/nexus}
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ../apps/api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://nexus:nexus@postgres:5432/nexus}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-32-bytes-min}
      API_KEY_PEPPER: ${API_KEY_PEPPER:-dev-api-key-pepper-change-me}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DOCUMENTS_STORAGE_PATH: /data/documents
      # Origins allowed to call the API from a browser (see app/main.py).
      # Defaults to the web app's local dev origin; override with the real
      # scheme+host(s) the web app is served from in any non-localhost
      # deployment, or the browser will block every request as CORS errors.
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    volumes:
      - document_storage:/data/documents
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    build:
      context: ../apps/api
    restart: unless-stopped
    command: ["python", "-m", "app.workers.worker"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://nexus:nexus@postgres:5432/nexus}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-32-bytes-min}
      API_KEY_PEPPER: ${API_KEY_PEPPER:-dev-api-key-pepper-change-me}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DOCUMENTS_STORAGE_PATH: /data/documents
    volumes:
      - document_storage:/data/documents
    # No healthcheck: an RQ worker has no HTTP endpoint to poll, and Docker
    # has no built-in "process is actively consuming jobs" probe. Ordering
    # is still guaranteed by these depends_on conditions, same as api.
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: ../apps/web
      # NEXT_PUBLIC_API_URL is inlined into the client bundle at build time
      # by Next.js, so it must be passed as a build arg (not just a runtime
      # environment variable below) or the browser bundle ships with it
      # unset. Defaults to localhost:8000 (not the api:8000 Docker DNS name)
      # because this value is read by client-side JS running in the user's
      # browser on the host, which cannot resolve the compose network. In
      # any non-localhost deployment, override this to the URL the browser
      # will actually reach the API on (e.g. https://api.example.com) and
      # keep the api service's CORS_ALLOWED_ORIGINS in sync with wherever
      # this web app ends up served from.
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  qdrant_data:
  document_storage:
